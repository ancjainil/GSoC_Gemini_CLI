# Behavioral Evaluation Nightly Workflow
# Runs the full evaluation suite, detects regressions, and publishes dashboard.
#
# Integrates with Gemini CLI's existing CI infrastructure.
# @author Jainil Rana <jainilrana503@gmail.com>

name: 'Evals: Behavioral Nightly'

on:
  schedule:
    # Run every day at 3:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      runs_per_scenario:
        description: 'Number of runs per scenario'
        required: false
        default: '5'
      model:
        description: 'Model to evaluate'
        required: false
        default: 'gemini-3-pro'

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  RUNS_PER_SCENARIO: ${{ github.event.inputs.runs_per_scenario || '5' }}
  EVAL_MODEL: ${{ github.event.inputs.model || 'gemini-3-pro' }}

jobs:
  run-evals:
    name: Run Behavioral Evaluations
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Gemini CLI
        run: npm run build

      - name: Run evaluation suite
        env:
          RUN_EVALS: '1'
          EVAL_RUNS: ${{ env.RUNS_PER_SCENARIO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npx vitest run packages/eval-framework/scenarios/ \
            --reporter=json \
            --outputFile=eval-results.json \
            2>&1 | tee eval-output.log

      - name: Generate evaluation report
        if: always()
        run: |
          npx tsx packages/eval-framework/src/cli/generate-report.ts \
            --results eval-results.json \
            --output eval-report/ \
            --model ${{ env.EVAL_MODEL }} \
            --version $(node -p "require('./package.json').version")

      - name: Check for regressions
        if: always()
        id: regression-check
        run: |
          npx tsx packages/eval-framework/src/cli/check-regressions.ts \
            --results eval-results.json \
            --output regression-report.md

          # Set output for PR comment
          if [ -f regression-report.md ]; then
            echo "has_regressions=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload evaluation dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-dashboard-${{ github.run_number }}
          path: eval-report/
          retention-days: 90

      - name: Upload trajectory logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-trajectories-${{ github.run_number }}
          path: evals/logs/
          retention-days: 30

      - name: Post nightly summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read the regression report
            let body = '## Behavioral Eval Nightly Summary\n\n';
            if (fs.existsSync('regression-report.md')) {
              body += fs.readFileSync('regression-report.md', 'utf-8');
            }

            // Read the eval results summary
            if (fs.existsSync('eval-results.json')) {
              const results = JSON.parse(fs.readFileSync('eval-results.json', 'utf-8'));
              const passed = results.numPassedTests || 0;
              const failed = results.numFailedTests || 0;
              const total = passed + failed;
              body += `\n\n**Results:** ${passed}/${total} scenarios passing`;
              body += `\n**Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            }

            // Create a check run with the summary
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Behavioral Eval Nightly',
              head_sha: context.sha,
              status: 'completed',
              conclusion: '${{ steps.regression-check.outcome }}' === 'success' ? 'success' : 'failure',
              output: {
                title: 'Behavioral Evaluation Results',
                summary: body,
              },
            });

  # Gate job for PR-triggered evals (runs on ALWAYS_PASSES only)
  ci-gate:
    name: CI Eval Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Run CI evals (ALWAYS_PASSES only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npx vitest run packages/eval-framework/scenarios/ \
            --reporter=verbose \
            2>&1 | tee ci-eval-output.log

      - name: Check results
        if: failure()
        run: |
          echo "::error::Behavioral evaluation CI gate failed. One or more ALWAYS_PASSES scenarios did not pass."
          echo "Run '/fix-behavioral-eval' in Gemini CLI to investigate."
          exit 1
